version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  # Maintain Python dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      uv:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  # Maintain JavaScript dependencies (bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm:
        patterns:
          - "*"
    cooldown:
      default-days: 7
