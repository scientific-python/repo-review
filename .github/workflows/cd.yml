name: CD

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  dist:
    name: Distribution build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0

  webapp-make:
    name: Build Webapp Artifact
    runs-on: ubuntu-latest
    needs: [dist]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build webapp
        run: bun run build

      - name: Prepare release asset
        run: |
          mkdir -p out
          cp docs/_static/scripts/repo-review-app.min.js* out/
          cd out
          zip -r ../repo-review-app.zip ./*

      - name: Upload webapp artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repo-review-app
          path: repo-review-app.zip

  webapp-publish:
    name: Publish Webapp to Release
    runs-on: ubuntu-latest
    needs: [webapp-make]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write # needed for GH upload
      attestations: write # needed for attest
      id-token: write # needed for attest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true # needed for release

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repo-review-app
          path: .

      - name: Attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "${{ github.workspace }}/repo-review-app.zip"

      - name: Upload webapp asset to release
        run: gh release upload "$GITHUB_REF_NAME" repo-review-app.zip
        env:
          GH_TOKEN: ${{ github.token }}

  webapp-npm-make:
    name: Build npm Artifact
    runs-on: ubuntu-latest
    needs: [dist]
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build lib
        run: bun run build-lib

      - name: Upload npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repo-review-npm
          path: dist/

  webapp-npm-publish:
    name: Publish Webapp to npm
    runs-on: ubuntu-latest
    needs: [webapp-npm-make]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: npm
    permissions:
      contents: read # needed for checkout
      id-token: write # needed for npm trusted publishing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repo-review-npm
          path: dist/

      - name: Publish to npm
        run: npm publish --provenance --access public

  publish:
    name: Publish
    needs: [dist]
    environment: pypi
    permissions:
      id-token: write # needed for attestations
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
