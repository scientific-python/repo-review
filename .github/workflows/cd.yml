name: CD

on:
  workflow_dispatch:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  dist:
    name: Distribution build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@v2

  webapp-make:
    name: Build Webapp Artifact
    runs-on: ubuntu-latest
    needs: [dist]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build webapp
        run: bun run build

      - name: Prepare release asset
        run: |
          mkdir -p out
          cp docs/_static/scripts/webapp.min.js* out/
          cp docs/_static/scripts/index.html out/index.html
          cd out
          zip -r ../repo-review-app.zip ./*

      - name: Upload webapp artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-review-app
          path: repo-review-app.zip

  webapp-publish:
    name: Publish Webapp to Release
    runs-on: ubuntu-latest
    needs: [webapp-make]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write # needed for GH upload
      attestations: write # needed for attest
      id-token: write # needed for attest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: repo-review-app
          path: .

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: "${{ github.workspace }}/repo-review-app.zip"

      - name: Upload webapp asset to release
        run: gh release upload "$GITHUB_REF_NAME" repo-review-app.zip
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish
    needs: [dist]
    environment: pypi
    permissions:
      id-token: write # needed for attestations
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
